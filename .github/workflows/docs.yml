name: Build Docs

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [docs-update]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: erlang:28
    steps:
      - uses: actions/checkout@v4

      - name: Checkout the barrel umbrella
        uses: actions/checkout@v4
        with:
          repository: barrel-db/barrel
          path: repos/barrel
          token: ${{ secrets.DOCS_TOKEN }}

      # barrel_vectordb builds a NIF through CMake.
      - name: Install build tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends cmake

      - name: Build all docs
        run: BARREL_DIR="$GITHUB_WORKSPACE/repos/barrel" bash scripts/build-docs.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: docs-dist
          retention-days: 7

