name: Build Docs

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [docs-update]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout barrel_vectordb docs
        uses: actions/checkout@v4
        with:
          repository: barrel-db/barrel_vectordb
          path: repos/barrel_vectordb
          token: ${{ secrets.DOCS_TOKEN }}

      - name: Checkout barrel_docdb docs
        uses: actions/checkout@v4
        with:
          repository: barrel-db/barrel_docdb
          path: repos/barrel_docdb
          token: ${{ secrets.DOCS_TOKEN }}

      - name: Checkout barrel_embed docs
        uses: actions/checkout@v4
        with:
          repository: barrel-db/barrel_embed
          path: repos/barrel_embed
          token: ${{ secrets.DOCS_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs
        run: pip install mkdocs>=1.6 mkdocs-material>=9.5 pymdown-extensions>=10.0

      - name: Build all docs
        run: |
          mkdir -p docs-dist

          # Build vectordb docs
          cd repos/barrel_vectordb
          mkdocs build --site-dir ../../docs-dist/vectordb
          cd ../..

          # Build docdb docs
          cd repos/barrel_docdb
          mkdocs build --site-dir ../../docs-dist/docdb
          cd ../..

          # Build embed docs
          cd repos/barrel_embed
          mkdocs build --site-dir ../../docs-dist/embed
          cd ../..

          # Create index redirect
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;url=/vectordb/"></head></html>' > docs-dist/index.html

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: docs-dist
          retention-days: 7

