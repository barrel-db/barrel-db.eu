name: Build Site

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [docs-update]

jobs:
  build:
    runs-on: ubuntu-latest
    # The library reference is generated with rebar3 ex_doc from the umbrella,
    # so the site build needs Erlang.
    container:
      image: erlang:28
    steps:
      - uses: actions/checkout@v4

      - name: Checkout the barrel umbrella
        uses: actions/checkout@v4
        with:
          repository: barrel-db/barrel
          path: repos/barrel
          token: ${{ secrets.DOCS_TOKEN }}

      - name: Install build tools
        # barrel_vectordb builds a NIF through CMake; the Astro site needs Node.
        run: |
          apt-get update
          apt-get install -y --no-install-recommends cmake nodejs npm

      - name: Install dependencies
        run: npm ci

      # Runs scripts/build-docs.sh (ex_doc -> public/docs/lib), then astro
      # build, then the pagefind index.
      - name: Build the site
        run: BARREL_DIR="$GITHUB_WORKSPACE/repos/barrel" npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: dist
          retention-days: 7

