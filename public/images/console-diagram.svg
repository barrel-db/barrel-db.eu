<svg viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Background -->
  <rect width="600" height="280" fill="#222929"/>

  <!-- Central Console -->
  <rect x="230" y="90" width="140" height="100" rx="8" fill="#006B77" stroke="#75B6B2" stroke-width="2"/>
  <text x="300" y="130" text-anchor="middle" fill="#F3F3F2" font-family="Roboto, sans-serif" font-size="14" font-weight="600">Barrel Console</text>
  <text x="300" y="150" text-anchor="middle" fill="#F3F3F2" font-family="Roboto, sans-serif" font-size="10" opacity="0.7">Control Plane</text>

  <!-- Console icon -->
  <rect x="275" y="160" width="50" height="20" rx="2" fill="#222929" stroke="#75B6B2" stroke-width="1"/>
  <circle cx="285" cy="170" r="3" fill="#C65E59"/>
  <circle cx="295" cy="170" r="3" fill="#75B6B2"/>
  <circle cx="305" cy="170" r="3" fill="#75B6B2"/>

  <!-- Left Cloud (Your Infrastructure) -->
  <g transform="translate(40, 60)">
    <!-- Cloud shape -->
    <path d="M80 120 C30 120 20 80 50 60 C40 20 100 10 110 50 C150 30 170 80 140 100 C160 120 120 140 80 120" fill="#2d3333" stroke="#444c4c" stroke-width="1"/>
    <text x="85" y="75" text-anchor="middle" fill="#F3F3F2" font-family="Roboto, sans-serif" font-size="9" opacity="0.6">Your Cloud</text>

    <!-- Nodes -->
    <rect x="45" y="85" width="30" height="24" rx="3" fill="#C65E59" stroke="#a84d49" stroke-width="1"/>
    <text x="60" y="100" text-anchor="middle" fill="#F3F3F2" font-family="Roboto, sans-serif" font-size="8">DB</text>

    <rect x="85" y="85" width="30" height="24" rx="3" fill="#C65E59" stroke="#a84d49" stroke-width="1"/>
    <text x="100" y="100" text-anchor="middle" fill="#F3F3F2" font-family="Roboto, sans-serif" font-size="8">DB</text>
  </g>

  <!-- Right Cloud (Another DC) -->
  <g transform="translate(400, 60)">
    <!-- Cloud shape -->
    <path d="M80 120 C30 120 20 80 50 60 C40 20 100 10 110 50 C150 30 170 80 140 100 C160 120 120 140 80 120" fill="#2d3333" stroke="#444c4c" stroke-width="1"/>
    <text x="85" y="75" text-anchor="middle" fill="#F3F3F2" font-family="Roboto, sans-serif" font-size="9" opacity="0.6">Another DC</text>

    <!-- Nodes -->
    <rect x="55" y="85" width="30" height="24" rx="3" fill="#C65E59" stroke="#a84d49" stroke-width="1"/>
    <text x="70" y="100" text-anchor="middle" fill="#F3F3F2" font-family="Roboto, sans-serif" font-size="8">DB</text>

    <rect x="95" y="85" width="30" height="24" rx="3" fill="#C65E59" stroke="#a84d49" stroke-width="1"/>
    <text x="110" y="100" text-anchor="middle" fill="#F3F3F2" font-family="Roboto, sans-serif" font-size="8">DB</text>
  </g>

  <!-- Connection lines (dashed) -->
  <line x1="175" y1="140" x2="230" y2="140" stroke="#75B6B2" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="370" y1="140" x2="425" y2="140" stroke="#75B6B2" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Bottom edge node -->
  <g transform="translate(260, 220)">
    <rect x="0" y="0" width="80" height="35" rx="4" fill="#2d3333" stroke="#444c4c" stroke-width="1"/>
    <rect x="15" y="10" width="22" height="16" rx="2" fill="#C65E59" stroke="#a84d49" stroke-width="1"/>
    <text x="26" y="21" text-anchor="middle" fill="#F3F3F2" font-family="Roboto, sans-serif" font-size="7">DB</text>
    <text x="55" y="22" text-anchor="middle" fill="#F3F3F2" font-family="Roboto, sans-serif" font-size="8" opacity="0.6">Edge</text>
  </g>

  <!-- Connection to edge -->
  <line x1="300" y1="190" x2="300" y2="220" stroke="#75B6B2" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Labels -->
  <text x="300" y="25" text-anchor="middle" fill="#75B6B2" font-family="Roboto, sans-serif" font-size="11" font-weight="500">Node Discovery &amp; Mesh Coordination</text>

  <!-- Small arrows on lines -->
  <polygon points="225,137 230,140 225,143" fill="#75B6B2"/>
  <polygon points="375,137 370,140 375,143" fill="#75B6B2"/>
  <polygon points="297,215 300,220 303,215" fill="#75B6B2"/>
</svg>
